<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام التحقق من التأشيرات السعودية</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
            font-size: 32px;
        }
        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
        }
        .info-box {
            background: #e7f3ff;
            border-right: 4px solid #2196F3;
            padding: 15px;
            margin-bottom: 25px;
            border-radius: 5px;
        }
        .upload-box {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            margin-bottom: 20px;
            background: #f8f9ff;
            cursor: pointer;
            transition: all 0.3s;
        }
        .upload-box:hover {
            border-color: #764ba2;
            background: #f0f2ff;
        }
        input[type="file"] { display: none; }
        .upload-label {
            font-size: 20px;
            color: #667eea;
            font-weight: bold;
            cursor: pointer;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            margin-top: 15px;
        }
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .progress {
            margin-top: 25px;
            display: none;
        }
        .progress-bar {
            background: #e9ecef;
            border-radius: 10px;
            height: 40px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        .progress-fill {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            height: 100%;
            width: 0%;
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 16px;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
        }
        .stat-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-number {
            font-size: 28px;
            font-weight: bold;
            color: #667eea;
        }
        .stat-label {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }
        .log {
            margin-top: 20px;
            max-height: 200px;
            overflow-y: auto;
            background: #f8f9fa;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 12px;
        }
        .log-item {
            padding: 5px;
            border-bottom: 1px solid #ddd;
        }
        .success { color: #28a745; }
        .error { color: #dc3545; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛂 نظام التحقق من التأشيرات</h1>
        <p class="subtitle">نظام آلي للتحقق من حالة التأشيرات السعودية</p>
        
        <div class="info-box">
            <strong>📋 تعليمات الاستخدام:</strong><br>
            ✓ تأكد أن ملف Excel يحتوي على عمود "رقم الطلب"<br>
            ✓ ارفع الملف واضغط "بدء المعالجة"<br>
            ✓ انتظر حتى يتم التحقق من جميع الطلبات<br>
            ✓ سيتم عرض الإحصائيات وتحميل الملف
        </div>
        
        <div class="upload-box" onclick="document.getElementById('fileInput').click()">
            <input type="file" id="fileInput" accept=".xlsx,.xls" required>
            <label for="fileInput" class="upload-label">
                📁 اضغط هنا لرفع ملف Excel
            </label>
            <div id="fileName" style="margin-top: 10px; color: #28a745; font-weight: bold;"></div>
        </div>
        
        <button class="btn" id="startBtn" onclick="startProcessing()">
            🚀 بدء المعالجة
        </button>
        
        <div class="progress" id="progress">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill">0%</div>
            </div>
            <div class="stats">
                <div class="stat-box">
                    <div class="stat-number" id="totalStat">0</div>
                    <div class="stat-label">الإجمالي</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number" id="successStat" style="color: #28a745;">0</div>
                    <div class="stat-label">مؤشر</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number" id="errorStat" style="color: #dc3545;">0</div>
                    <div class="stat-label">غير مؤشر</div>
                </div>
            </div>
            <div class="log" id="log"></div>
        </div>
    </div>

    <script>
        let selectedFile = null;
        
        document.getElementById('fileInput').addEventListener('change', function(e) {
            if (e.target.files.length > 0) {
                selectedFile = e.target.files[0];
                document.getElementById('fileName').textContent = '✓ ' + selectedFile.name;
            }
        });
        
        function addLog(message, type = 'info') {
            const log = document.getElementById('log');
            const item = document.createElement('div');
            item.className = 'log-item ' + type;
            item.textContent = message;
            log.appendChild(item);
            log.scrollTop = log.scrollHeight;
        }
        
        async function startProcessing() {
            if (!selectedFile) {
                alert('الرجاء اختيار ملف أولاً');
                return;
            }
            
            const formData = new FormData();
            formData.append('file', selectedFile);
            
            document.getElementById('startBtn').disabled = true;
            document.getElementById('progress').style.display = 'block';
            document.getElementById('log').innerHTML = '';
            
            addLog('بدء المعالجة...', 'info');
            
            try {
                const response = await fetch('/process', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.success) {
                    addLog(`تمت المعالجة بنجاح!`, 'success');
                    addLog(`الإجمالي: ${data.total}`, 'info');
                    addLog(`مؤشر: ${data.success_count}`, 'success');
                    addLog(`غير مؤشر: ${data.error_count}`, 'error');
                    
                    document.getElementById('totalStat').textContent = data.total;
                    document.getElementById('successStat').textContent = data.success_count;
                    document.getElementById('errorStat').textContent = data.error_count;
                    document.getElementById('progressFill').style.width = '100%';
                    document.getElementById('progressFill').textContent = '100% - تم الانتهاء';
                    
                    alert('✅ تم الانتهاء! سيتم تحميل الملف');
                    window.location.href = '/download/' + data.filename;
                } else {
                    addLog('خطأ: ' + data.error, 'error');
                    alert('حدث خطأ: ' + data.error);
                }
            } catch (error) {
                addLog('خطأ في الاتصال: ' + error.message, 'error');
                alert('حدث خطأ: ' + error.message);
            } finally {
                document.getElementById('startBtn').disabled = false;
            }
        }
    </script>
</body>
</html>
